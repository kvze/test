name: Dev CI

on:
    pull_request:
        branches:
            - dev
    push:
        branches:
            - dev

permissions:
    contents: read

jobs:
    build:
        name: Check React project
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint project
              run: npm run lint --if-present

            - name: Build project
              run: npm run build
